<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-pink-100">

<img src="gatito7.webp">
<img src="gatito3.webp">
<img src="gatito4.webp">

<p class="text-lg">
Entonces, tengo posibilidad de volver a ser tu novio?
</p>

<input type="text" id="mensaje"
class="border rounded-lg bg-gray-100"
placeholder="Escribe tu mensaje">

<br><br>

<button class="bg-gray-100" onclick="responder('acepto')">
Acepto
</button>

<button  class="bg-gray-100" onclick="responder('no acepta')">
No acepta
</button>

<button class="border rounded-lg bg-blue-100 p-2"
onclick="guardar()">
Enviar mensaje
</button>

<p>Escribe lo que piensas arriba. Si lo leeré</p>





<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
  getFirestore,
  addDoc,
  collection
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBoG-o0XjQMeQ4vemkNZF0VKJ6KuM2qk1g",
  authDomain: "rosyyyy.firebaseapp.com",
  projectId: "rosyyyy",
  storageBucket: "rosyyyy.firebasestorage.app",
  messagingSenderId: "730750517480",
  appId: "1:730750517480:web:8fc91708735e44e8fac95d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// MENSAJES
window.guardar = async function(){

   const texto =
      document.getElementById("mensaje").value

   await addDoc(collection(db, "si,mensajes"), {

      mensaje: texto

   })

   alert("Mensaje guardado")

}

// RESPUESTAS
window.responder = async function(respuesta){

   await addDoc(collection(db, "si,respuestas"), {

      respuesta: respuesta

   })

   alert("Respuesta enviada")

}

</script>
</body>
</html>
